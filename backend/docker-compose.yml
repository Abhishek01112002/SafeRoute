version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: saferoute-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-saferoute_secret_2026}
      - POSTGRES_DB=${DB_NAME:-saferoute}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-saferoute}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: saferoute-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-saferoute_secret_2026}@db:5432/${DB_NAME:-saferoute}
      - SQLITE_URL=sqlite:///./data/saferoute.db
      - ENABLE_PG=true
      - ENABLE_DUAL_WRITE=true
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-key-change-it}
      - ENVIRONMENT=production
    volumes:
      - ./data:/app/data
    networks:
      - saferoute-network

networks:
  saferoute-network:
    driver: bridge

volumes:
  pgdata:
  # Map local data folder for SQLite persistence
