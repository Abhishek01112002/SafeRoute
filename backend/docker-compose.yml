version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: saferoute-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-saferoute_secret_2026}
      - POSTGRES_DB=${DB_NAME:-saferoute}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-saferoute}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saferoute-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: saferoute-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-saferoute_access}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-saferoute_secret_change_me}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: saferoute-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres.hcsmypvaolyphuacgfbs:Anshuman%40SafeRoute@aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres
      - SQLITE_URL=sqlite:///./data/saferoute.db
      - ENABLE_PG=true
      - ENABLE_DUAL_WRITE=true
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-key-change-it}
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-saferoute_access}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-saferoute_secret_change_me}
      - MINIO_BUCKET=saferoute-media
      - MINIO_USE_SSL=false
      - TUID_SALT=${TUID_SALT:-SR_IDENTITY_V1_UTTARAKHAND_2025}
      - QR_JWT_EXPIRY_DAYS=365
    volumes:
      - ./data:/app/data
    networks:
      - saferoute-network

networks:
  saferoute-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
