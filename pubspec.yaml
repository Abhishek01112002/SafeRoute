name: saferoute
description: "A tourist safety app for North East India using BLE Mesh, GPS, and Blockchain."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.1
  provider: ^6.1.2
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  qr_flutter: ^4.1.0
  image_picker: ^1.0.7
  geolocator: ^11.0.0
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^5.0.2
  flutter_background_service: ^5.0.5
  intl: ^0.19.0
  crypto: ^3.0.3
  lottie: ^3.1.0
  flutter_local_notifications: ^17.0.0
  web_socket_channel: ^2.4.0
  flutter_blue_plus: ^1.31.0
  flutter_ble_peripheral: ^1.2.0
  uuid: ^4.3.3
  url_launcher: ^6.2.5
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  path: ^1.9.0
  image: ^4.8.0
  sensors_plus: ^5.0.1
  battery_plus: ^6.0.2
  camera: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Trail graphs are loaded from the backend API and cached in SQLite.
  # No bundled graph assets needed.
