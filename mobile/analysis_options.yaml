# analysis_options.yaml
#
# SafeRoute Flutter Linting & Analysis Rules
# -------------------------------------------
# Enforces team-wide coding standards on top of flutter_lints.
# Run: flutter analyze
# This file is automatically used by the IDE and CI.

include: package:flutter_lints/flutter.yaml

analyzer:
  # Treat these as errors (build-breaking in CI)
  errors:
    missing_required_param: error
    missing_return: error
    dead_code: warning
    unused_import: warning
    unused_local_variable: warning

  # Exclude generated files from analysis
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/generated/**"
    - "build/**"

linter:
  rules:
    # ── Imports ──────────────────────────────────────────────
    # Enforce: import 'package:saferoute/...' (never '../')
    always_use_package_imports: true

    # ── Safety ───────────────────────────────────────────────
    avoid_print: true                  # use debugPrint() instead
    cancel_subscriptions: true         # prevent subscription leaks
    close_sinks: true                  # prevent StreamSink leaks

    # ── Style ────────────────────────────────────────────────
    prefer_const_constructors: true    # const where possible
    prefer_const_literals_to_create_immutables: true
    prefer_final_locals: true          # prevent accidental reassignment
    unnecessary_const: true            # remove redundant const keywords
    unnecessary_new: true              # no 'new' keyword

    # ── Naming ───────────────────────────────────────────────
    camel_case_types: true
    non_constant_identifier_names: true

    # ── Async ────────────────────────────────────────────────
    unawaited_futures: true            # flag forgotten awaits
    avoid_void_async: true             # avoid `void async` — use Future<void>

    # ── Performance ──────────────────────────────────────────
    avoid_unnecessary_containers: true
    sized_box_for_whitespace: true     # SizedBox instead of Container for spacing
